name: 🏠 도메인 헌터 자동 실행

on:
  schedule:
    # 매일 한국시간 오전 7시 실행 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 수동 실행도 가능
    inputs:
      date_from:
        description: '시작일 (예: 2023-01-01, 비워두면 전체)'
        required: false
        default: ''
      date_to:
        description: '종료일 (예: 2024-12-31, 비워두면 전체)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 패키지 설치
        run: pip install openpyxl requests

      - name: 🔍 whois 설치
        run: sudo apt-get install -y whois

      - name: 🏠 도메인 헌터 실행
        env:
          API_KEY: ${{ secrets.APPLYHOME_API_KEY }}
          DATE_FROM: ${{ github.event.inputs.date_from || '' }}
          DATE_TO: ${{ github.event.inputs.date_to || '' }}
        run: |
          ARGS="--key $API_KEY --workers 6"
          if [ -n "$DATE_FROM" ]; then ARGS="$ARGS --date-from $DATE_FROM"; fi
          if [ -n "$DATE_TO" ]; then ARGS="$ARGS --date-to $DATE_TO"; fi
          python domain_hunter_web.py $ARGS

      - name: 📄 GitHub Pages 배포 준비
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

  deploy:
    needs: hunt
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
